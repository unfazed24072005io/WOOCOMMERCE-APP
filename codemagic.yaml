workflows:
  apk:
    name: Build APK
    environment:
      node: 18
    scripts:
      - name: Install dependencies
        script: npm install
      
      - name: Generate Android folder
        script: npx expo prebuild --platform android --clean
      
      - name: Build APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
      
    artifacts:
      - "android/app/build/outputs/apk/release/*.apk"
